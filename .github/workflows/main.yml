name: NRW Daily Heat Map

on:
  schedule:
    # Daily 08:15 UTC = 09:15 CET / 10:15 CEST
    - cron: "15 8 * * *"
  workflow_dispatch:   # manually triggerable

permissions:
  contents: write      # for committing back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout repo ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python + Dependencies ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── Generate map ───────────────────────────────────────────────────────
      - name: Generate heat map
        run: python generate_map.py

      # ── Commit result ──────────────────────────────────────────────────────
      - name: Commit map
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Hitzekarte_NRW_heute.jpg
          # Only commit if there are changes
          git diff --cached --quiet || \
            git commit -m "Auto: Heat Map $(date +'%Y-%m-%d')"
          git push
